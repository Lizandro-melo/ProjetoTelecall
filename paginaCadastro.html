<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <link rel="shortcut icon" href="img/favicon.png" type="image/x-icon" />
    
    <title>Telecall - Cadastro</title>
</head>

<body>
    <header>
        <nav id="header-secundario">
            <ul>
                <li>
                    <img src="img/icons/icons-buttons/TTps.png" alt="icone-font" />
                </li>
                <li>
                    <img src="img/icons/icons-buttons/icone_ps.png" alt="icone-tema" />
                </li>
            </ul>
        </nav>
        <section id="primary-header">
            <img src="img/logo-telecall.png" alt="Logo-Telecall" />
            <nav>
                <ul>
                    <li>
                        <a class="" href="index.html">Área do Cliente</a>
                    </li>
                    <li>
                        <a class="linkado">Cadastro</a>
                    </li>
                </ul>
            </nav>
        </section>
    </header>
    <main>
        <form id="form-cadastro" class="formulario">
            <div class="banner" id="banner-cadastro">
                <h1>Área de Cadastro</h1>
            </div>
            <section id="area-entradas">
                <section class="container-entradas-cadastro" id="area-esquerda">
                    <section class="area-dupla">
                        <div>
                            <label for="nome">Nome</label>
                            <input name="entradas" type="text" id="nome" autofocus />
                        </div>
                        <div>
                            <label for="sobrenome">Sobrenome</label>
                            <input name="entradas" type="text" id="sobrenome" />
                        </div>
                    </section>
                    <section class="area-dupla">
                        <div>
                            <label for="cpf">CPF</label>
                            <input name="entradas" type="text" id="cpf" maxlength="14" />
                        </div>
                        <div>
                            <label for="data">Data de nascimento</label>
                            <input name="entradas" type="date" id="data" />
                        </div>
                    </section>
                    <label for="sexo">Sexo</label>
                    <select id="sexo" name="entradas">
                        <option value="m">Masculino</option>
                        <option value="f">Feminino</option>
                        <option value="o">Outros</option>
                    </select>
                    <label for="nome-materno">Nome materno</label>
                    <input name="entradas" type="text" id="nome-materno" />
                </section>
                <section class="container-entradas-cadastro" id="area-direita">
                    <section class="area-dupla">
                        <div>
                            <label for="tel-cel">Telefone celular</label>
                            <input name="entradas" type="tel" id="tel-cel" />
                        </div>
                        <div>
                            <label for="tel-fix">Telefone fixo</label>
                            <input name="entradas" type="tel" id="tel-fix" />
                        </div>
                    </section>
                    <label for="endereco">Endereço</label>
                    <input name="entradas" type="text" id="endereco" />
                    <label for="login">Login</label>
                    <input name="entradas" type="text" id="login" />
                    <section class="area-dupla">
                        <div>
                            <label for="senha">Senha</label>
                            <input name="entradas" type="password" id="senha" />
                        </div>
                        <div>
                            <label for="confirm-senha">Confirmar senha</label>
                            <input name="entradas" type="password" id="confirm-senha" />
                        </div>
                    </section>
                </section>
            </section>
            <section id="conteiner-buttons-cadastro">
                <button id="button-cadastro">Enviar</button>
                <section id="container-mensagem-help-cadastro">
                    <span id="msg-cadastro">Já é cliente Telecall? <br />
                        <a href="index.html">Fazer login</a>
                    </span>
                </section>
            </section>
        </form>
    </main>
    <script src="js/verificarCampos.js"></script>
    <script src="js/cadastro/createUser.js"></script>
    <script src="js/cadastro/envioDados.js"></script>
    <script src="js/cadastro/validarCampos.js"></script>
</body>

</html>
