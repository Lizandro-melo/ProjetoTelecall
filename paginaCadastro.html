<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="shortcut icon" href="img/favicon.png" type="image/x-icon">
    <title>Telecall - Cadastro</title>
</head>

<body>
    <header>
        <nav id="header-secundario">
            <ul>
                <li><img src="img/icons/icons-buttons/TTps.png" alt="icone-font"></li>
                <li><img src="img/icons/icons-buttons/icone_ps.png" alt="icone-tema"></li>
            </ul>
        </nav>
        <section id="primary-header">
            <img src="img/logo-telecall.png" alt="Logo-Telecall">
            <nav>
                <ul>
                    <li>
                        <a class="" href="index.html">Área do Cliente</a>
                    </li>
                    <li>
                        <a class="linkado">Cadastro</a>
                    </li>
                </ul>
            </nav>
        </section>
    </header>
    <main>
        <form id="form-cadastro" class="formulario">
            <section class="container-entradas-cadastro" id="area-esquerda">
                <label for="nome">Nome</label>
                <input type="text" id="nome">
                <label for="sobrenome">Sobrenome</label>
                <input type="text" id="sobrenome">
                <label for="data">Data de nascimento</label>
                <input type="text" id="data">
                <label for="sexo">Sexo</label>
                <select id="sexo">
                    <option value="m">Masculino</option>
                    <option value="f">Feminino</option>
                    <option value="o">Outros</option>
                </select>
                <label for="nome-materno">Nome materno</label>
                <input type="text" id="nome-materno">
                <label for="cpf">CPF</label>
                <input type="text" id="cpf">
            </section>
            <section class="container-entradas-cadastro" id="area-direita">
                <label for="tel-cel">Telefone celular</label>
                <input type="tel" id="tel-cel">
                <label for="tel-fix">Telefone fixo</label>
                <input type="tel" id="tel-cel">
                <label for="endereco">Endereço</label>
                <input type="text" id="endereco">
                <label for="login">Login</label>
                <input type="text" id="login">
                <label for="senha">Senha</label>
                <input type="password" id="senha">
                <label for="confirm-senha">Confirmar senha</label>
                <input type="password" id="confirm-senha">
            </section>
            <section id="conteiner-buttons-cadastro">
                <button type="submit" id="button-cadastro">
                    Enviar
                </button>
                <div id="container-mensagem-help-cadastro">
                    <span id="msg-cadastro">Já é cliente Telecall? <br>
                        <a href="index.html">Fazer login</a>
                    </span>
                </div>
            </section>
        </form>

    </main>

</body>

</html>
