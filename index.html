<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="shortcut icon" href="img/favicon.png" type="image/x-icon">
    <title>Telecall - Area do Cliente</title>
</head>
<body>
    <header>
        <nav id="header-secundario">
            <ul>
                <li><img src="img/icons/icons-buttons/TTps.png" alt="icone-font"></li>
                <li><img src="img/icons/icons-buttons/icone_ps.png" alt="icone-tema"></li>
            </ul>
        </nav>
        <section id="primary-header">
            <img src="img/logo-telecall.png" alt="Logo-Telecall">
            <nav>
                <ul>
                    <li>
                        <a class="linkado">Área do Cliente</a>
                    </li>
                    <li>
                        <a class="" href="paginaCadastro.html">Cadastro</a>
                    </li>
                </ul>
            </nav>
        </section>
    </header>
    <main>
        <form id="form-login" class="formulario">
            <div class="banner">
                <h1>Área do cliente</h1>
            </div>
            <section id="container-entradas-login">
                <label for="login">Login</label>
                <input class="entrada-login" type="text" id="login">
                <label for="senha">Senha</label>
                <input class="entrada-login" type="password" id="senha">
            </section>
            <section id="container-button-login">
                <span id="msg-login">Ainda não é cliente?<br>
                    <a id="a-help" href="paginaCadastro.html">Cadastre-se aqui.</a>
                </span>
                <span id="msg-login-senha"><a id="a-help-senha" href="#">Esqueci a senha.
                    </a></span>
                <button>
                    Entrar
                </button>

            </section>
        </form>
    </main>
</body>

</html>
