<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="shortcut icon" href="img/favicon.png" type="image/x-icon">
    <script src="js/function.js"></script>
    <title>Telecall - Area do Cliente</title>
</head>
<body>
    <header>
        <nav id="header-secundario">
            <ul>
                <li><button id="font" ><img src="img/icons/icons-buttons/TTps.png" alt="icone-font"></button></li>
                <li><button id="themes"><img  src="img/icons/icons-buttons/icone_ps.png" alt="icone-tema"></button></li>
            </ul>
        </nav>
        <section id="primary-header">
            <img src="img/logo-telecall.png" alt="Logo-Telecall">
            <nav>
                <ul>
                    <li>
                        <a class="linkado">Área do Cliente</a>
                    </li>
                    <li>
                        <a class="" href="paginaCadastro.html">Cadastro</a>
                    </li>
                </ul>
            </nav>
        </section>
    </header>
    <section id="janela-mensagem" class="esconder-container">
        <button type="button" class="exit">X</button>
        <h2 id="mensagem">

        </h2>
    </section>
    
    <main>
        <form id="esqueci-senha" class="esconder-container">
            <div class="banner">
                <h1>Esqueceu a senha?</h1>
            </div>
            <button type="button" class="exit">X</button>
            <section class="container-entradas-login">
                <label for="login">Digite o seu login / CPF</label>
                <input placeholder="Digite seu login" class="entrada-login" type="text" >
            </section>
            <section class="container-button-login">
                <button type="button">
                    Enviar
                </button>
            </section>
        </form>
        <form id="form-login" class="aparecer-container">
            <div class="banner">
                <h1>Área do cliente</h1>
            </div>
            <section class="container-entradas-login">
                <label for="login">Login</label>
                <input placeholder="Digite seu login" name="entradas" class="entrada-login" type="text" id="login">
                <label for="senha">Senha</label>
                <input placeholder="Digite sua senha" name="entradas" class="entrada-login" type="password" id="senha">
            </section>
            <section class="container-button-login">
                <span id="msg-login">Ainda não é cliente?<br>
                    <a id="a-help" href="paginaCadastro.html">Cadastre-se aqui.</a>
                </span>
                <span id="msg-login-senha"><a id="a-help-senha" href="#">Esqueci a senha.
                    </a></span>
                <button type="button" id="entrar">
                    Entrar
                </button>

            </section>
        </form>
    </main>
    <script src="js/login.js"></script>
</body>

</html>
